[build]
  # Tell Netlify that the frontend code is in the AdvancedTODOlist subdirectory
  base = "AdvancedTODOlist"
  
  # Build command (will run inside the base directory)
  command = "npm run build"
  
  # The output directory relative to the base directory
  publish = "dist"

# Redirect all requests to index.html so React Router can handle routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
